services:
    ocr:
        build:
            context: ./ocr-service
            dockerfile: Dockerfile
        container_name: birr-track-ocr
        ports:
            - '8000:8000'
        restart: unless-stopped
        healthcheck:
            test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
            interval: 15s
            timeout: 5s
            retries: 10

    postgres:
        image: postgres:16-alpine
        container_name: birr-track-postgres
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: birr_track
        ports:
            - '5432:5432'
        volumes:
            - birrtrack_postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d birr_track']
            interval: 5s
            timeout: 3s
            retries: 20

    redis:
        image: redis:7-alpine
        container_name: birr-track-redis
        ports:
            - '6379:6379'
        volumes:
            - birrtrack_redis_data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 3s
            retries: 20

volumes:
    birrtrack_postgres_data:
    birrtrack_redis_data:
